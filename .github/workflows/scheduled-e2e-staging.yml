name: Scheduled E2E Staging Tests

# Runs the lean 14-test booking-flow Playwright suite across the staging browser matrix
# (chromium / firefox / webkit). The suite covers normal booking smoke,
# TEST10/FREE100/FREEWEEK promo boundaries, and referral flows.
# Per-env results POST to the production API so they show in Admin → Test Results.
# Targets STAGING ONLY — there is intentionally no production option.

on:
  schedule:
    - cron: '0 4 * * 1'  # Monday at 4am UTC
    - cron: '0 4 * * 3'  # Wednesday at 4am UTC
    - cron: '0 4 * * 5'  # Friday at 4am UTC
    - cron: '0 4 * * 6'  # Saturday at 4am UTC

  workflow_dispatch:  # allow manual trigger from the Actions tab

env:
  PYTHON_VERSION: '3.11'
  E2E_SOURCE_BRANCH: staging

jobs:
  e2e-matrix:
    name: Staging E2E Cross-Browser Matrix
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.E2E_SOURCE_BRANCH }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Python dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install playwright python-dotenv psycopg2-binary

      - name: Install Playwright browsers
        working-directory: ./backend
        run: |
          python -m playwright install --with-deps chromium firefox webkit

      - name: Run cross-browser matrix against staging
        working-directory: ./backend
        env:
          STAGING_DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          TEST_RESULTS_API_KEY: ${{ secrets.TEST_RESULTS_API_KEY }}
          PROD_API_URL: ${{ secrets.PROD_API_URL }}
          HEADLESS: 'true'
        run: |
          python3 run_staging_batches.py --matrix --size 2 --retries 1 --post-results

      - name: Create E2E summary
        if: always()
        run: |
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          root = Path("backend/staging_logs")
          root.mkdir(parents=True, exist_ok=True)

          logs = sorted(root.glob("**/test_*.log"))
          rows = []
          for log_path in logs:
              text = log_path.read_text(errors="ignore")
              env_name = log_path.parent.name if log_path.parent != root else "single"
              test_name = log_path.stem.removeprefix("test_")
              summary_matches = re.findall(r"Successful:\s*(\d+)\s*\nFailed:\s*(\d+)", text)
              if summary_matches:
                  successful, failed = summary_matches[-1]
                  passed = int(successful) > 0 and int(failed) == 0
              else:
                  passed = False
              reference_matches = re.findall(r"Reference:\s*([A-Z0-9-]+)", text)
              error_line = ""
              if not passed:
                  for line in reversed(text.splitlines()):
                      stripped = line.strip()
                      if "Error:" in stripped or "Timeout" in stripped or "Failed:" in stripped:
                          error_line = stripped
                          break
              rows.append(
                  {
                      "environment": env_name,
                      "test": test_name,
                      "passed": passed,
                      "reference": reference_matches[-1] if reference_matches else "",
                      "error": error_line,
                  }
              )

          lines = ["## E2E Staging Matrix Summary", ""]
          if not rows:
              lines.append("No per-test logs were found in `backend/staging_logs`.")
          else:
              by_env = {}
              for row in rows:
                  by_env.setdefault(row["environment"], []).append(row)

              lines.extend(["| Environment | Passed | Failed | Total |", "|-------------|--------|--------|-------|"])
              for env_name in sorted(by_env):
                  env_rows = by_env[env_name]
                  passed_count = sum(1 for row in env_rows if row["passed"])
                  failed_count = len(env_rows) - passed_count
                  lines.append(f"| `{env_name}` | {passed_count} | {failed_count} | {len(env_rows)} |")

              failures = [row for row in rows if not row["passed"]]
              if failures:
                  lines.extend(["", "### Failed E2E Tests", "", "| Environment | Test | Last error |", "|-------------|------|------------|"])
                  for row in failures:
                      error = row["error"].replace("|", "\\|") or "No error line found in test log."
                      lines.append(f"| `{row['environment']}` | `{row['test']}` | {error} |")

              references = [row for row in rows if row["reference"]]
              if references:
                  lines.extend(["", "### Created Booking References", "", "| Environment | Test | Reference |", "|-------------|------|-----------|"])
                  for row in references:
                      lines.append(f"| `{row['environment']}` | `{row['test']}` | `{row['reference']}` |")

          summary = "\n".join(lines) + "\n"
          Path("backend/staging_logs/summary.md").write_text(summary)

          step_summary = os.environ.get("GITHUB_STEP_SUMMARY")
          if step_summary:
              with open(step_summary, "a", encoding="utf-8") as handle:
                  handle.write(summary)
          print(summary)
          PY

      - name: Upload per-test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-staging-logs
          path: backend/staging_logs/
          retention-days: 14

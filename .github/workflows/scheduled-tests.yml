name: Scheduled Test Suite

on:
  # Run 4 times per week: Monday, Wednesday, Friday, Saturday at 5am UTC
  schedule:
    - cron: '0 5 * * 1'  # Monday at 5am UTC
    - cron: '0 5 * * 3'  # Wednesday at 5am UTC
    - cron: '0 5 * * 5'  # Friday at 5am UTC
    - cron: '0 5 * * 6'  # Saturday at 5am UTC

  # Allow manual triggering
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to run tests against'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  PYTHON_VERSION: '3.11'

jobs:
  run-tests:
    name: Run Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio httpx pandas freezegun
          pip install -r requirements.txt

      - name: Run tests with coverage
        id: test_run
        working-directory: ./backend
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          ENVIRONMENT: staging
        run: |
          START_TIME=$(date +%s)

          # Run all tests (database.py handles missing DB gracefully)
          python -m pytest tests/ \
            --cov=. \
            --cov-report=json \
            --cov-report=term \
            --junitxml=test-results.xml \
            -v \
            2>&1 | tee test-output.txt

          EXIT_CODE=${PIPESTATUS[0]}
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))

          # Parse test results
          PASSED=$(grep -oP '\d+(?= passed)' test-output.txt | head -1 || echo "0")
          FAILED=$(grep -oP '\d+(?= failed)' test-output.txt | head -1 || echo "0")
          SKIPPED=$(grep -oP '\d+(?= skipped)' test-output.txt | head -1 || echo "0")
          TOTAL=$((PASSED + FAILED + SKIPPED))

          # Parse coverage percentage from JSON
          if [ -f coverage.json ]; then
            COVERAGE=$(python -c "import json; print(json.load(open('coverage.json'))['totals']['percent_covered'])" 2>/dev/null || echo "0")
          else
            COVERAGE="0"
          fi

          # Set outputs
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "skipped=$SKIPPED" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "duration=$DURATION" >> $GITHUB_OUTPUT
          echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

          # Exit with test result
          exit $EXIT_CODE
        continue-on-error: true

      - name: Report results to Production API
        if: always()
        working-directory: ./backend
        env:
          TEST_RESULTS_API_KEY: ${{ secrets.TEST_RESULTS_API_KEY }}
          PROD_API_URL: ${{ secrets.PROD_API_URL }}
        run: |
          # Report to production API for QA Dashboard
          python3 -c "
          import json
          import urllib.request
          import os

          payload = {
              'environment': 'production',
              'run_type': 'scheduled',
              'tests_passed': ${{ steps.test_run.outputs.passed || 0 }},
              'tests_failed': ${{ steps.test_run.outputs.failed || 0 }},
              'tests_skipped': ${{ steps.test_run.outputs.skipped || 0 }},
              'tests_total': ${{ steps.test_run.outputs.total || 0 }},
              'coverage_percent': ${{ steps.test_run.outputs.coverage || 0 }},
              'duration_seconds': ${{ steps.test_run.outputs.duration || 0 }},
              'commit_sha': '${{ github.sha }}',
              'branch': '${{ github.ref_name }}',
              'logs_url': '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}',
              'triggered_by': 'github_actions',
              'api_key': os.environ.get('TEST_RESULTS_API_KEY', '')
          }

          api_url = os.environ.get('PROD_API_URL', '')
          if not api_url:
              print('WARNING: PROD_API_URL secret is not set!')
              exit(0)

          print(f'Reporting to: {api_url}/api/test-results')
          data = json.dumps(payload).encode('utf-8')
          req = urllib.request.Request(f'{api_url}/api/test-results', data=data, headers={'Content-Type': 'application/json'})
          try:
              with urllib.request.urlopen(req, timeout=30) as response:
                  print(f'Success: {response.status}')
                  print(response.read().decode())
          except urllib.error.HTTPError as e:
              print(f'HTTP Error {e.code}: {e.reason}')
              print(e.read().decode())
          except Exception as e:
              print(f'Failed to report results: {e}')
          "

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            backend/test-results.xml
            backend/coverage.json
            backend/test-output.txt

      - name: Create summary
        if: always()
        run: |
          echo "## Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Passed | ${{ steps.test_run.outputs.passed }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Failed | ${{ steps.test_run.outputs.failed }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Skipped | ${{ steps.test_run.outputs.skipped }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Total | ${{ steps.test_run.outputs.total }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Coverage | ${{ steps.test_run.outputs.coverage }}% |" >> $GITHUB_STEP_SUMMARY
          echo "| Duration | ${{ steps.test_run.outputs.duration }}s |" >> $GITHUB_STEP_SUMMARY

      - name: Send email notification on failure
        if: steps.test_run.outputs.exit_code != '0'
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
        run: |
          curl -X POST "https://api.sendgrid.com/v3/mail/send" \
            -H "Authorization: Bearer $SENDGRID_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "personalizations": [{
                "to": [
                  {"email": "qa.orca.contact@gmail.com"},
                  {"email": "kristian@tagparking.co.uk"}
                ],
                "subject": "⚠️ TAG Scheduled Tests Failed - ${{ steps.test_run.outputs.failed }} failures"
              }],
              "from": {"email": "no-reply@tagparking.co.uk", "name": "TAG Test Suite"},
              "content": [{
                "type": "text/html",
                "value": "<h2>Scheduled Test Suite Failed</h2><p><strong>Branch:</strong> ${{ github.ref_name }}</p><p><strong>Results:</strong></p><ul><li>Passed: ${{ steps.test_run.outputs.passed }}</li><li>Failed: ${{ steps.test_run.outputs.failed }}</li><li>Skipped: ${{ steps.test_run.outputs.skipped }}</li><li>Coverage: ${{ steps.test_run.outputs.coverage }}%</li><li>Duration: ${{ steps.test_run.outputs.duration }}s</li></ul><p><a href=\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\">View full logs</a></p>"
              }]
            }' || echo "Failed to send email notification"

      - name: Send email notification on success
        if: steps.test_run.outputs.exit_code == '0'
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
        run: |
          curl -X POST "https://api.sendgrid.com/v3/mail/send" \
            -H "Authorization: Bearer $SENDGRID_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "personalizations": [{
                "to": [
                  {"email": "qa.orca.contact@gmail.com"},
                  {"email": "kristian@tagparking.co.uk"}
                ],
                "subject": "✅ TAG Scheduled Tests Passed - ${{ steps.test_run.outputs.passed }} tests"
              }],
              "from": {"email": "no-reply@tagparking.co.uk", "name": "TAG Test Suite"},
              "content": [{
                "type": "text/html",
                "value": "<h2>Scheduled Test Suite Passed</h2><p><strong>Branch:</strong> ${{ github.ref_name }}</p><p><strong>Results:</strong></p><ul><li>Passed: ${{ steps.test_run.outputs.passed }}</li><li>Skipped: ${{ steps.test_run.outputs.skipped }}</li><li>Coverage: ${{ steps.test_run.outputs.coverage }}%</li><li>Duration: ${{ steps.test_run.outputs.duration }}s</li></ul><p><a href=\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\">View full logs</a></p>"
              }]
            }' || echo "Failed to send email notification"

      - name: Check test results
        if: steps.test_run.outputs.exit_code != '0'
        run: |
          echo "Tests failed! See the logs above for details."
          exit 1

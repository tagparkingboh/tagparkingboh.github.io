name: Scheduled Test Suite

on:
  # Run twice per week: Monday and Thursday at 6am UTC
  schedule:
    - cron: '0 6 * * 1'  # Monday at 6am UTC
    - cron: '0 6 * * 4'  # Thursday at 6am UTC

  # Allow manual triggering
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to run tests against'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  PYTHON_VERSION: '3.11'

jobs:
  run-tests:
    name: Run Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio httpx
          pip install -r requirements.txt

      - name: Run tests with coverage
        id: test_run
        working-directory: ./backend
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          ENVIRONMENT: staging
        run: |
          START_TIME=$(date +%s)

          # Run tests with coverage, capture output
          python -m pytest tests/ \
            --cov=. \
            --cov-report=json \
            --cov-report=term \
            --junitxml=test-results.xml \
            -v \
            2>&1 | tee test-output.txt

          EXIT_CODE=${PIPESTATUS[0]}
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))

          # Parse test results
          PASSED=$(grep -oP '\d+(?= passed)' test-output.txt | head -1 || echo "0")
          FAILED=$(grep -oP '\d+(?= failed)' test-output.txt | head -1 || echo "0")
          SKIPPED=$(grep -oP '\d+(?= skipped)' test-output.txt | head -1 || echo "0")
          TOTAL=$((PASSED + FAILED + SKIPPED))

          # Parse coverage percentage from JSON
          if [ -f coverage.json ]; then
            COVERAGE=$(python -c "import json; print(json.load(open('coverage.json'))['totals']['percent_covered'])" 2>/dev/null || echo "0")
          else
            COVERAGE="0"
          fi

          # Set outputs
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "skipped=$SKIPPED" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "duration=$DURATION" >> $GITHUB_OUTPUT
          echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

          # Exit with test result
          exit $EXIT_CODE
        continue-on-error: true

      - name: Report results to API
        if: always()
        working-directory: ./backend
        env:
          TEST_RESULTS_API_KEY: ${{ secrets.TEST_RESULTS_API_KEY }}
          API_URL: ${{ secrets.STAGING_API_URL }}
        run: |
          curl -X POST "$API_URL/api/test-results" \
            -H "Content-Type: application/json" \
            -d '{
              "environment": "${{ inputs.environment || 'staging' }}",
              "run_type": "scheduled",
              "tests_passed": ${{ steps.test_run.outputs.passed || 0 }},
              "tests_failed": ${{ steps.test_run.outputs.failed || 0 }},
              "tests_skipped": ${{ steps.test_run.outputs.skipped || 0 }},
              "tests_total": ${{ steps.test_run.outputs.total || 0 }},
              "coverage_percent": ${{ steps.test_run.outputs.coverage || 0 }},
              "duration_seconds": ${{ steps.test_run.outputs.duration || 0 }},
              "commit_sha": "${{ github.sha }}",
              "branch": "${{ github.ref_name }}",
              "logs_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "triggered_by": "github_actions",
              "api_key": "'$TEST_RESULTS_API_KEY'"
            }' || echo "Failed to report results to API"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            backend/test-results.xml
            backend/coverage.json
            backend/test-output.txt

      - name: Create summary
        if: always()
        run: |
          echo "## Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Passed | ${{ steps.test_run.outputs.passed }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Failed | ${{ steps.test_run.outputs.failed }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Skipped | ${{ steps.test_run.outputs.skipped }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Total | ${{ steps.test_run.outputs.total }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Coverage | ${{ steps.test_run.outputs.coverage }}% |" >> $GITHUB_STEP_SUMMARY
          echo "| Duration | ${{ steps.test_run.outputs.duration }}s |" >> $GITHUB_STEP_SUMMARY

      - name: Check test results
        if: steps.test_run.outputs.exit_code != '0'
        run: |
          echo "Tests failed! See the logs above for details."
          exit 1
